<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EBS Tracker" />
  <meta name="theme-color" content="#080d1a" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="apple-touch-startup-image" href="icon-512.png" />
  <title>EBS Tracker тАФ Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .rpg-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .rpg-particles span {
      position: absolute; font-size: 20px; opacity: 0.06;
      animation: float linear infinite;
    }
    @keyframes float { 0%{transform:translateY(100vh) rotate(0deg);opacity:0} 10%{opacity:.06} 90%{opacity:.06} 100%{transform:translateY(-100px) rotate(360deg);opacity:0} }
  </style>
</head>
<body>
<script>document.addEventListener("DOMContentLoaded",()=>{if(typeof initTheme==="function"){initTheme();injectThemeToggle();}});</script>
  <div class="login-page">
    <div class="rpg-particles" id="particles"></div>

    <div class="login-box fade-in">
      <div class="login-logo">
        <img src="logo.png" alt="EBS Tracker" style="height:52px;mix-blend-mode:screen;margin-bottom:10px;" />
        <h1>EBS Tracker</h1>
        <p>Your office quest begins here</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-lg" id="loginBtn" style="width:100%; justify-content:center; margin-top:8px;">
        <span>тЪФя╕П</span> Enter the Arena
      </button>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-3);">
        Powered by Supabase ┬╖ v1.0
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (getSession()) {
      window.location.href = 'dashboard.html';
    }

    // Floating particles
    const emojis = ['тЪФя╕П','ЁЯЫбя╕П','тЪб','ЁЯФо','ЁЯМЯ','ЁЯСС','ЁЯП╣','ЁЯОп','ЁЯФе','ЁЯТп'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 15; i++) {
      const span = document.createElement('span');
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (8 + Math.random() * 14) + 's';
      span.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(span);
    }

    // Login handler
    const loginBtn = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.classList.add('show');
        return;
      }
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> AuthenticatingтАж';
      errEl.classList.remove('show');

      const result = await login(username, password);
      if (result.success) {
        loginBtn.innerHTML = 'тЬЕ Welcome back!';
        setTimeout(() => {
          window.location.href = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 600);
      } else {
        errEl.textContent = result.error;
        errEl.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>тЪФя╕П</span> Enter the Arena';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
